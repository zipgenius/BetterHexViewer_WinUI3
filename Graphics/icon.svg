-->
<svg width="256" height="256" viewBox="0 0 256 256"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#005FAD"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1A8FE3"/>
      <stop offset="100%" stop-color="#0A70C0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="256" height="256" rx="52" fill="url(#bg)"/>

  <!-- Badge: slightly lighter rounded rect, perfectly centred -->
  <rect x="28" y="72" width="200" height="112" rx="22"
        fill="url(#badge)"/>

  <!-- 0x text, optically centred inside the badge -->
  <text x="128" y="128"
        font-family="Cascadia Mono, Consolas, Courier New, monospace"
        font-size="108" font-weight="bold"
        text-anchor="middle" dominant-baseline="central"
        fill="#ffffff" fill-opacity="0.95">0x</text>

</svg>
