name: Build & Publish NuGet

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION: BetterHexViewer.sln
  LIB_PROJECT: src/BetterHexViewer.WinUI3/BetterHexViewer.WinUI3.csproj

jobs:
  build:
    name: Build & Test
    runs-on: windows-latest

    strategy:
      matrix:
        platform: [x64, x86, ARM64]
        configuration: [Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Add Windows SDK
        run: |
          nuget install Microsoft.Windows.SDK.BuildTools -Version 10.0.26100.7705 -OutputDirectory packages

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build library (${{ matrix.platform }})
        run: |
          dotnet build ${{ env.LIB_PROJECT }} `
            -c ${{ matrix.configuration }} `
            -p:Platform=${{ matrix.platform }} `
            --no-restore

  pack:
    name: Pack NuGet
    runs-on: windows-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Pack
        run: |
          dotnet pack ${{ env.LIB_PROJECT }} `
            -c Release `
            -p:Platform=x64 `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            --no-restore `
            -o nupkg

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: nupkg/*.nupkg

      - name: Publish to NuGet.org
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          dotnet nuget push nupkg/*.nupkg `
            --api-key ${{ secrets.NUGET_API_KEY }} `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate
